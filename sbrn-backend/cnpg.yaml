apiVersion: postgresql.cnpg.io/v1 
kind: Cluster 
metadata:
 name: postgrescn
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:13.6
  resources:
      requests: 
        memory: "100Mi"
        cpu: "50m"
      limits:
        memory: "200Mi"
        cpu: "100m"
  storage:
    size: 1Gi 
    storageClass: standard
  
  superuserSecret:
    name: pg-secret
  bootstrap:
    initdb:
      database: appdb 
      owner: postgres
      secret:
        name: pg-secret
  primaryUpdateStrategy: unsupervised