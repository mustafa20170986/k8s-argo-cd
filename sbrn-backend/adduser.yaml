apiVersion: apps/v1
kind: Deployment
metadata:
  name: adduser
  namespace: suborna
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adduser-express
  template:
    metadata:
      labels:
        app: adduser-express
    spec:
      initContainers:
        - name: db-sync-aduser
          image: adduser
          imagePullPolicy: Never
          resources: # Added this to satisfy quota
            requests:
              cpu: "50m"
              memory: "100Mi"
            limits:
              cpu: "100m"
              memory: "200Mi"
          command: ["/bin/sh","-c"]
          args: ["npx prisma db push"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sbrn-sec
                  key: DATABASE_URL
      containers:
        - name: adduser-container
          image: adduser
          imagePullPolicy: Never
          resources:
            requests:
              memory: "100Mi"
              cpu: "50m"
            limits:
              memory: "200Mi"
              cpu: "100m"
          env:
            - name: DATABASE_URL
              valueFrom: 
                secretKeyRef:
                  name: sbrn-sec
                  key: DATABASE_URL
          ports:
            - containerPort: 4045